server:
  port: ${PORT:8081}
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:200}
      min-spare: ${TOMCAT_MIN_THREADS:25}
    accept-count: ${TOMCAT_ACCEPT_COUNT:200}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:10000}
    max-keep-alive-requests: 100
    connection-timeout: 20s
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,application/xml
    min-response-size: 1024

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}

spring:
  application:
    name: helpinminutes-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/him}}
    username: ${DATABASE_USER:him}
    password: ${DATABASE_PASSWORD:him}
    hikari:
      # Keep a small warm pool to avoid connection establish latency
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT_MS:30000}
      max-lifetime: ${HIKARI_MAX_LIFETIME_MS:1800000}
      validation-timeout: ${HIKARI_VALIDATION_TIMEOUT_MS:5000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION_MS:2000}
      # In Docker, Postgres can take a few seconds to accept connections. Don't crash-loop.
      initialization-fail-timeout: -1
      data-source-properties:
        sslmode: ${DATABASE_SSLMODE:require}
        ssl: ${DATABASE_SSL:true}
        # Postgres optimization properties
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        reWriteBatchedInserts: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 5
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 30000
        default-requeue-rejected: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    connect-retries: 60
    connect-retries-interval: 2

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:12MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  env: ${APP_ENV:dev}
  jwt:
    accessSecret: ${JWT_ACCESS_SECRET:dev_access_secret_change_me}
    refreshSecret: ${JWT_REFRESH_SECRET:dev_refresh_secret_change_me}
    accessTtlSeconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refreshTtlSeconds: ${JWT_REFRESH_TTL_SECONDS:2592000}

  otp:
    ttlSeconds: ${OTP_TTL_SECONDS:300}
    # Return OTP in the API response for demo/prod until SMS provider is wired.
    returnOtpInResponse: ${OTP_RETURN_IN_RESPONSE:true}

  matching:
    h3Resolution: ${MATCH_H3_RESOLUTION:9}
    maxKRing: ${MATCH_MAX_KRING:3}
    offerFanout: ${MATCH_OFFER_FANOUT:5}
    helperStaleAfterSeconds: ${MATCH_HELPER_STALE_AFTER_SECONDS:120}
    offerTtlSeconds: ${MATCH_OFFER_TTL_SECONDS:120}

  realtime:
    redisPubSubChannel: ${REALTIME_REDIS_CHANNEL:him:rt:events}

twilio:
  accountSid: ${TWILIO_ACCOUNT_SID:}
  authToken: ${TWILIO_AUTH_TOKEN:}
  verifyServiceSid: ${TWILIO_VERIFY_SERVICE_SID:}

logging:
  level:
    org.springframework.security: INFO
